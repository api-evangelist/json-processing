aid: json-processing
name: JSON Processing
description: >-
  JSON Processing (JSON-P) is a Java API for parsing, generating, transforming,
  and querying JSON messages. Standardized as Jakarta JSON Processing, it
  provides both an object model API and a streaming API for working with JSON
  data in Java applications. The current stable release is Jakarta JSON
  Processing 2.1 (Jakarta EE 10), with version 2.2 under development for
  Jakarta EE 12.
